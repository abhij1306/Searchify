<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Searchify — User dropdown with Settings (Light)</title>
<meta name="description" content="Searchify sidebar user dropdown menu opening upward from the account trigger, with a Settings item placed directly above Sign out. Light theme." />
<!--
  DESIGN SYSTEM (docs/design.md §8 dropdown + user-menu.tsx):
  Dropdown surface = bg-elevated, 1px border, shadow-elevated, radius-md, 4px padding.
  DropdownLabel: 10px uppercase +0.06em muted. DropdownItem: 13px foreground, 6px/10px pad, radius-sm,
  hover = bg-alt. DropdownSeparator: 1px bg-border-subtle. Menu opens side=top, align=start,
  width = calc(240px - 2rem). Sidebar 240px bg-sidebar. lucide icons stroke 2.
-->
<style>
  :root{
    color-scheme:light;
    --font-sans:"Geist","Inter",system-ui,-apple-system,"Segoe UI",sans-serif;
    --bg-base:#f7f8f7; --bg-alt:#eef0ee; --bg-panel:#ffffff; --bg-well:#e2e5e2; --bg-sidebar:#f2f4f2; --bg-elevated:#ffffff;
    --border-subtle:#edefed; --border:#e2e5e2; --border-strong:#d0d4d0;
    --text-primary:#1d211f; --text-secondary:#4c524f; --text-muted:#6f756f; --text-subtle:#9aa09a;
    --accent:#0f9d76; --accent-soft:rgba(15,157,118,.06); --accent-subtle:rgba(15,157,118,.10); --accent-text:#0b6f52;
    --neutral-bg:rgba(29,33,31,.045);
    --shadow-card:0 12px 28px rgba(18,22,20,.04);
    --shadow-elevated:0 18px 42px rgba(18,22,20,.08), 0 0 0 1px rgba(18,22,20,.04);
    --radius-sm:5px; --radius-md:7px; --radius-lg:10px; --radius-full:9999px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{font-family:var(--font-sans);font-size:14px;line-height:1.5;background:var(--bg-base);color:var(--text-primary);-webkit-font-smoothing:antialiased;display:flex;}
  svg.icon{width:16px;height:16px;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;fill:none;flex:none;}

  .sidebar{position:relative;display:flex;flex-direction:column;gap:16px;width:240px;flex:none;height:100dvh;padding:16px;background:var(--bg-sidebar);border-right:1px solid var(--border);}

  .switcher{display:flex;width:100%;align-items:center;gap:10px;padding:6px 10px;text-align:left;border:1px solid var(--border);border-radius:var(--radius-md);background:var(--bg-panel);}
  .switcher .avatar{display:flex;width:28px;height:28px;flex:none;align-items:center;justify-content:center;border-radius:var(--radius-md);background:var(--accent-soft);color:var(--accent-text);font-size:10px;font-weight:700;text-transform:uppercase;}
  .switcher .meta{min-width:0;flex:1;}
  .switcher .name{display:block;font-size:13px;font-weight:600;}
  .switcher .sub{display:block;font-size:10px;color:var(--text-muted);}
  .switcher .chev{color:var(--text-muted);}

  .nav{display:flex;flex-direction:column;gap:20px;flex:1;overflow:hidden;}
  .nav-group{display:flex;flex-direction:column;gap:4px;}
  .nav-group>p{margin:0;padding:0 10px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);}
  .nav-item{display:flex;align-items:center;gap:10px;padding:6px 10px;border-radius:var(--radius-md);font-size:13px;font-weight:500;color:var(--text-secondary);text-decoration:none;}
  .nav-item:hover{background:var(--bg-alt);color:var(--text-primary);}
  .nav-item.active{background:var(--accent-subtle);color:var(--accent-text);}
  .nav-item .pill{margin-left:auto;border-radius:var(--radius-full);background:var(--neutral-bg);padding:2px 6px;font-size:10px;font-weight:600;text-transform:uppercase;color:var(--text-muted);}
  .nav-item.soon{color:var(--text-subtle);cursor:not-allowed;}

  .usermenu-wrap{position:relative;border-top:1px solid var(--border-subtle);padding-top:8px;}
  .usermenu{display:flex;width:100%;align-items:center;gap:10px;padding:6px 10px;border-radius:var(--radius-md);text-align:left;background:var(--bg-alt);border:0;cursor:pointer;}
  .usermenu .avatar{display:flex;width:28px;height:28px;flex:none;align-items:center;justify-content:center;border-radius:var(--radius-full);background:var(--accent-soft);color:var(--accent-text);font-size:10px;font-weight:700;text-transform:uppercase;}
  .usermenu .meta{min-width:0;flex:1;}
  .usermenu .email{display:block;font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .usermenu .role{display:block;font-size:10px;text-transform:capitalize;color:var(--text-muted);}

  /* dropdown menu, opening upward from trigger */
  .menu{position:absolute;left:0;bottom:calc(100% + 4px);width:calc(240px - 2rem);overflow:hidden;border:1px solid var(--border);border-radius:var(--radius-md);background:var(--bg-elevated);box-shadow:var(--shadow-elevated);padding:4px;}
  .menu-label{padding:6px 10px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .menu-sep{height:1px;margin:4px 0;background:var(--border-subtle);}
  .menu-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:var(--radius-sm);font-size:13px;color:var(--text-primary);text-decoration:none;cursor:pointer;}
  .menu-item:hover{background:var(--bg-alt);}
  .menu-item.hl{background:var(--bg-alt);}

  /* right side: dimmed page for context */
  .stage{flex:1;background:var(--bg-base);position:relative;}
  .topbar{display:flex;height:52px;align-items:center;gap:12px;border-bottom:1px solid var(--border);background:var(--bg-panel);padding:0 16px;color:var(--text-muted);font-size:13px;}
  .scrim{position:absolute;inset:52px 0 0 0;background:rgba(0,0,0,.02);}
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <symbol id="i-gauge" viewBox="0 0 24 24"><path d="m12 14 4-4"/><path d="M3.34 19a10 10 0 1 1 17.32 0"/></symbol>
  <symbol id="i-msg" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><path d="M13 8H7"/><path d="M17 12H7"/></symbol>
  <symbol id="i-checks" viewBox="0 0 24 24"><path d="m3 17 2 2 4-4"/><path d="m3 7 2 2 4-4"/><path d="M13 6h8"/><path d="M13 12h8"/><path d="M13 18h8"/></symbol>
  <symbol id="i-plug" viewBox="0 0 24 24"><path d="M6.3 20.3a2.4 2.4 0 0 0 3.4 0L12 18l-6-6-2.3 2.3a2.4 2.4 0 0 0 0 3.4Z"/><path d="m2 22 3-3"/><path d="M7.5 13.5 10 11"/><path d="M10.5 16.5 13 14"/><path d="m18 3-4 4h6l-4 4"/></symbol>
  <symbol id="i-shield" viewBox="0 0 24 24"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/></symbol>
  <symbol id="i-settings" viewBox="0 0 24 24"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></symbol>
  <symbol id="i-route" viewBox="0 0 24 24"><circle cx="6" cy="19" r="3"/><path d="M9 19h8.5a3.5 3.5 0 0 0 0-7h-11a3.5 3.5 0 0 1 0-7H15"/><circle cx="18" cy="5" r="3"/></symbol>
  <symbol id="i-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></symbol>
  <symbol id="i-chev" viewBox="0 0 24 24"><path d="m7 15 5 5 5-5"/><path d="m7 9 5-5 5 5"/></symbol>
  <symbol id="i-logout" viewBox="0 0 24 24"><path d="m16 17 5-5-5-5"/><path d="M21 12H9"/><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/></symbol>
</svg>

<aside class="sidebar">
  <button class="switcher" aria-label="Switch project">
    <span class="avatar">BL</span>
    <span class="meta"><span class="name">best&amp;less</span><span class="sub">3 projects</span></span>
    <svg class="icon chev"><use href="#i-chev"/></svg>
  </button>

  <nav class="nav" aria-label="Primary">
    <div class="nav-group">
      <p>Analytics</p>
      <a class="nav-item" href="#"><svg class="icon"><use href="#i-gauge"/></svg><span>Visibility</span></a>
    </div>
    <div class="nav-group">
      <p>Prompts</p>
      <a class="nav-item" href="#"><svg class="icon"><use href="#i-msg"/></svg><span>Your Prompts</span></a>
    </div>
    <div class="nav-group">
      <p>Actions</p>
      <a class="nav-item" href="#"><svg class="icon"><use href="#i-checks"/></svg><span>Runs</span></a>
      <a class="nav-item" href="#"><svg class="icon"><use href="#i-plug"/></svg><span>Providers</span></a>
    </div>
    <div class="nav-group">
      <p>On Page</p>
      <a class="nav-item" href="#"><svg class="icon"><use href="#i-settings"/></svg><span>Setup</span></a>
      <a class="nav-item" href="#"><svg class="icon"><use href="#i-shield"/></svg><span>Site Health</span></a>
      <a class="nav-item" href="#"><svg class="icon"><use href="#i-route"/></svg><span>Issues</span></a>
    </div>
  </nav>

  <div class="usermenu-wrap">
    <!-- dropdown open, side=top -->
    <div class="menu" role="menu" data-component-id="user-menu-dropdown" aria-label="Account menu">
      <div class="menu-label">abhineet.jain@cube27.com</div>
      <div class="menu-sep"></div>
      <a class="menu-item" href="#" role="menuitem" data-component-id="user-menu-settings"><svg class="icon"><use href="#i-settings"/></svg><span>Settings</span></a>
      <button class="menu-item hl" role="menuitem" data-component-id="user-menu-signout"><svg class="icon"><use href="#i-logout"/></svg><span>Sign out</span></button>
    </div>

    <button class="usermenu" aria-expanded="true" aria-haspopup="menu" data-component-id="user-menu-trigger">
      <span class="avatar">AB</span>
      <span class="meta"><span class="email">abhineet.jain@cube27.com</span><span class="role">user</span></span>
    </button>
  </div>
</aside>

<div class="stage">
  <div class="topbar"><svg class="icon"><use href="#i-search"/></svg><span>Find anything…</span></div>
  <div class="scrim"></div>
</div>
</body>
</html>
