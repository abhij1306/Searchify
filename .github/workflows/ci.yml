name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (ruff, pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: searchify
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/searchify
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies (frozen lock)
        run: uv sync --frozen --extra dev
      - name: Ruff
        run: uv run ruff check .
      - name: Pytest
        run: uv run pytest -q

  frontend:
    name: Frontend (vitest, tsc, policy, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Vitest
        run: pnpm test
      - name: Type check
        run: pnpm exec tsc --noEmit
      - name: Architecture / token policy
        run: pnpm check:policy
      - name: Build
        run: pnpm build

  security:
    name: Security (pip-audit, detect-secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Dependency audit (SCA)
        working-directory: backend
        run: |
          uv export --frozen --no-emit-project --format requirements.txt -o requirements-audit.txt
          uvx pip-audit --strict -r requirements-audit.txt
      - name: Secrets scan (against committed baseline)
        run: |
          uvx detect-secrets scan --baseline .secrets.baseline \
            --exclude-files 'uv\.lock|pnpm-lock\.yaml|\.secrets\.baseline'
