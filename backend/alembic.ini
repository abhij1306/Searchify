[alembic]
# Migrations live at the repo root (../migrations); run alembic from backend/.
script_location = ../migrations
prepend_sys_path = .
# Overridden at runtime from Settings.database_url in migrations/env.py.
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/searchify

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
