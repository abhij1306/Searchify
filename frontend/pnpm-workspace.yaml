allowBuilds:
  esbuild: true
  msw: true
  sharp: true
  unrs-resolver: true

# Supply-chain hardening: refuse packages whose trust signals (provenance,
# signatures) weaken between updates.
#
# NOTE: `minimumReleaseAge` (a 7-day quarantine on freshly published versions)
# was removed at the maintainer's request. Newly published versions are now
# installed immediately, with no maturity window.
trustPolicy: no-downgrade
# Skip the downgrade check for releases older than ~1 year — they predate
# widespread provenance publishing and trip the check for benign reasons.
# Anything newer must keep (or strengthen) its trust evidence.
trustPolicyIgnoreAfter: 525600
# Pinned exceptions: recent versions that trip the downgrade check for benign
# reasons (e.g. a release published without provenance while earlier ones had
# it). Reviewed individually; keep this list short and exact.
trustPolicyExclude:
  - 'undici-types@6.21.0'
  - 'eslint-import-resolver-typescript@3.10.1'

# Force the transitive postcss (Next pulls 8.4.31) up to a patched line
# (CVE-2026-41305). pnpm 10+ reads overrides here, not from package.json.
overrides:
  postcss: '>=8.5.10'
  # Migrated from the `pnpm.overrides` field in package.json, which pnpm 11 no
  # longer reads (it was being silently ignored). Keeps the React type packages
  # pinned to a single version across the tree.
  '@types/react': '19.2.17'
  '@types/react-dom': '19.2.3'
